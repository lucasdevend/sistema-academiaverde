<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel - PowerFit</title>
    <link rel="stylesheet" href="style.css">

    <style>
        /* FUNDO */

body{
    padding:40px;
    background: linear-gradient(135deg, #021c12, #160202);
    color:white;
    font-family: Arial;
}


/* TÍTULO */

h1{
    margin-bottom:30px;
    color:#00ff5e;
    text-shadow: 0 0 10px #00ff5e44;
}


/* TABELA */

table{
    width:100%;
    border-collapse:collapse;
    background:#0a0a0a;
    border-radius:10px;
    overflow:hidden;
    box-shadow: 0 0 20px #00ff5e22;
}


/* CABEÇALHO */

th{
    background:#001a0f;
    color:#00ff5e;
    padding:15px;
    text-align:left;
}


/* LINHAS */

td{
    padding:15px;
    border-bottom:1px solid #111;
}


/* EFEITO HOVER */

tr:hover{
    background:#001a0f;
}


/* STATUS */

.status-ativo{
    color:#00ff5e;
    font-weight:bold;
}

.status-pendente{
    color:orange;
    font-weight:bold;
}


/* BOTÕES */

button{
    border:none;
    padding:8px 12px;
    cursor:pointer;
    border-radius:6px;
    font-weight:bold;
    margin-right:5px;
}


/* BOTÃO CONFIRMAR */

.btn-ok{
    background:#00ff5e;
    color:black;
}


/* BOTÃO EXCLUIR */

.btn-del{
    background:#ff3b3b;
    color:white;
}


/* EFEITO HOVER BOTÕES */

button:hover{
    transform:scale(1.1);
    transition:0.2s;
}

/* DASHBOARD */

.dashboard{
    display:flex;
    gap:20px;
    margin-bottom:30px;
}

.card-dash{
    flex:1;
    background:#0a0a0a;
    padding:25px;
    border-radius:10px;
    text-align:center;
    box-shadow: 0 0 15px #00ff5e22;
    transition:0.3s;
}

.card-dash:hover{
    transform:translateY(-5px);
    box-shadow: 0 0 25px #00ff5e55;
}

.card-dash h3{
    margin-bottom:10px;
    color:#aaa;
}

.card-dash p{
    font-size:28px;
    color:#00ff5e;
    font-weight:bold;
}

.btn-renew{
background:#0099ff;
color:white;
}
    </style>

</head>

<body>

    <h1>📊 Painel de Controle - PowerFit</h1>

    <div class="dashboard">

        <div class="card-dash">
            <h3>Total de Alunos</h3>
            <p id="totalAlunos">0</p>
        </div>

        <div class="card-dash">
            <h3>Alunos Ativos</h3>
            <p id="ativos">0</p>
        </div>

        <div class="card-dash">
            <h3>Faturamento</h3>
            <p id="faturamento">R$ 0</p>
        </div>
    </div>

    <input 
        type="text" 
        id="busca" 
        placeholder="Buscar aluno..."
        onkeyup="buscarAluno()"
        style="padding:10px; width:99%; margin-bottom:20px; background-color: #065b374e;">

    <table>
        
        <thead>
            <tr>
                <th>Nome</th>
                <th>Telefone</th>
                <th>Plano</th>
                <th>Data</th>
                <th>Ação</th>
            </tr>
        </thead>

        <tbody id="listaAlunos"></tbody>

        </tbody>
    </table>

<script src="admin.js"></script>

</body>

</html>
